<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booki — Ajustes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="settings-body" data-theme="">
    <header class="s-header">
      <img class="s-logo" src="/brand/svg/logo.svg" alt="Booki" />
      <p class="s-tagline">Tu dock, a tu manera.</p>
    </header>

    <main class="s-main">
      <section class="s-card">
        <h2>Apariencia</h2>

        <div class="s-row">
          <label for="theme">Tema</label>
          <select id="theme">
            <option value="system">Sistema</option>
            <option value="light">Claro</option>
            <option value="dark">Oscuro</option>
          </select>
        </div>

        <div class="s-row">
          <label>Color de acento</label>
          <div class="swatches" id="swatches"></div>
        </div>

        <div class="s-row">
          <label for="iconSize">Tamaño de iconos</label>
          <input type="range" id="iconSize" min="32" max="80" step="4" />
          <span class="s-val" id="iconSizeVal"></span>
        </div>

        <div class="s-row">
          <label for="spacing">Espaciado</label>
          <input type="range" id="spacing" min="0" max="20" step="1" />
          <span class="s-val" id="spacingVal"></span>
        </div>

        <div class="s-row">
          <label for="opacity">Translucidez</label>
          <input type="range" id="opacity" min="20" max="100" step="5" />
          <span class="s-val" id="opacityVal"></span>
        </div>
      </section>

      <section class="s-card">
        <h2>Comportamiento</h2>

        <div class="s-row">
          <label for="edge">Borde de anclaje</label>
          <select id="edge">
            <option value="bottom">Abajo</option>
            <option value="top">Arriba</option>
            <option value="left">Izquierda</option>
            <option value="right">Derecha</option>
          </select>
        </div>

        <label class="s-toggle">
          <span>Magnificar iconos al pasar el cursor</span>
          <input type="checkbox" id="magnification" />
          <span class="s-switch"></span>
        </label>

        <div class="s-row" id="zoomRow">
          <label for="zoom">Intensidad del zoom</label>
          <input type="range" id="zoom" min="100" max="250" step="10" />
          <span class="s-val" id="zoomVal"></span>
        </div>

        <label class="s-toggle">
          <span>Mostrar nombres al pasar el cursor</span>
          <input type="checkbox" id="showLabels" />
          <span class="s-switch"></span>
        </label>
        <label class="s-toggle">
          <span>Indicar apps en ejecución</span>
          <input type="checkbox" id="showIndicators" />
          <span class="s-switch"></span>
        </label>
        <label class="s-toggle">
          <span>Mantener siempre visible</span>
          <input type="checkbox" id="alwaysOnTop" />
          <span class="s-switch"></span>
        </label>
        <label class="s-toggle">
          <span>Ocultar automáticamente</span>
          <input type="checkbox" id="autoHide" />
          <span class="s-switch"></span>
        </label>
      </section>

      <section class="s-card">
        <h2>Apps ancladas</h2>
        <ul class="pin-list" id="pinList"></ul>
        <div class="s-actions">
          <button class="s-btn" id="addApp">+ Añadir app…</button>
          <button class="s-btn s-btn-soft" id="addSep">+ Separador</button>
        </div>
      </section>

      <section class="s-card">
        <h2>Acerca de</h2>
        <div class="s-about">
          <img class="s-about-logo" src="/brand/svg/isotype.svg" alt="Booki" />
          <div>
            <strong>Booki Dock</strong>
            <span class="s-ver" id="version">v—</span>
            <p class="s-tagline" style="margin-top: 4px">Un dock alegre y ligero para Windows.</p>
          </div>
        </div>
        <div class="s-actions" style="margin-top: 12px">
          <button class="s-btn s-btn-soft" id="resetCfg">Restablecer apariencia</button>
        </div>
      </section>

      <section class="s-card s-danger">
        <button class="s-btn s-btn-ghost" id="quitApp">Salir de Booki</button>
      </section>
    </main>

    <script type="module" src="./settings.js"></script>
  </body>
</html>
