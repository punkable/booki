<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booki</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="notch-body">
    <button class="notch-pill notch-enter" id="notch-pill" title="Show Booki" aria-label="Show Booki"></button>
    <div class="notch-toast" id="notch-toast" role="status" aria-live="polite">
      <img class="notch-toast-mark" src="/brand/svg/isotype.svg" alt="" width="16" height="16" draggable="false" />
      <span class="notch-toast-copy">
        <span class="notch-toast-title" id="notch-toast-title"></span>
        <span class="notch-toast-sub" id="notch-toast-sub"></span>
      </span>
    </div>
    <script type="module" src="./notch.js"></script>
  </body>
</html>
