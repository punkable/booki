name: Release Booki Legacy (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Legacy release tag (for example v0.51.0)"
        required: true
        default: "v0.51.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Check visible text encoding
        run: npm run check:text

      - name: Resolve release tag
        id: version
        shell: bash
        run: echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build and publish Booki Legacy
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.version.outputs.tag }}
          releaseName: "Booki Legacy ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.version.outputs.tag }}"
          releaseBody: |
            ## Booki Legacy

            The original, stable Tauri-based edition of Booki for Windows.

            Download **`Booki.Legacy_*_x64-setup.exe`** for the standard per-user installation. An MSI package is also included for managed Windows environments.

            Booki Legacy remains available and maintained while the native WinUI 3 edition continues its preview phase.

            **Windows SmartScreen:** Booki does not yet use a commercial code-signing certificate. Windows may display a warning. Verify that the download comes from `punkable/booki`, then select **More info** and **Run anyway**.

            Created by **Punkable**.
          releaseDraft: false
          prerelease: false

      - name: Verify Legacy installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.version.outputs.tag }}"
          assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "$assets"
          grep -Eq 'Booki\.Legacy_.*_x64-setup\.exe$' <<< "$assets"
          grep -Eq 'Booki\.Legacy_.*\.msi$' <<< "$assets"
          grep -Eq 'latest\.json$' <<< "$assets"
