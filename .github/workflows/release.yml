name: Release Booki (Windows)

# Publishes a GitHub Release with the Windows installers (.exe / .msi)
# attached, so anyone can download Booki Dock directly — no login or
# digging through CI artifacts required.
#
# Trigger by pushing a tag like `v0.1.0`, or run manually from the
# Actions tab (workflow_dispatch) providing a tag name.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Check visible text encoding
        run: npm run check:text

      - name: Check icons and emoji assets
        run: npm run check:icons

      # Derive the release tag from package.json for manual runs. Normal
      # publishing is tag-based, so a version ships exactly once.
      - name: Resolve release tag
        id: ver
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and publish release
        id: tauri
        continue-on-error: true
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-updater signing. Add these as repo secrets to enable signed
          # update artifacts (latest.json + .sig). Until then, builds are
          # unsigned and the in-app updater simply finds no update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}
          releaseName: "Booki ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}"
          releaseBody: |
            **Booki** is a Tauri-based smart dock for Windows 10 and Windows 11.

            Download the **`Booki_*_x64-setup.exe`** installer for the normal per-user installation. An MSI package is also included for managed Windows environments.

            WebView2 is downloaded automatically when it is missing.

            **SmartScreen note:** Booki does not yet use a commercial code-signing certificate, so Windows may display a warning. Choose **More info**, verify that the publisher and source are expected, and then choose **Run anyway**.

            Created by **Punkable** ([GitHub](https://github.com/punkable) and [@0xPunki on X](https://x.com/0xPunki)).
          releaseDraft: false
          # Must be a full release (not prerelease) so the updater endpoint
          # `releases/latest/download/latest.json` resolves. "Beta" is a label only.
          prerelease: false

      # Always keep the built installers as Actions artifacts so a follow-up
      # `gh release upload` can finish publishing if tauri-action cannot create
      # the GitHub Release (e.g. restricted GITHUB_TOKEN on bot-pushed tags).
      - name: Upload Windows installers as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booki-windows-${{ steps.ver.outputs.tag }}
          path: |
            src-tauri/target/release/bundle/nsis/Booki_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/Booki_*_x64-setup.exe.sig
            src-tauri/target/release/bundle/msi/Booki_*_x64_en-US.msi
            src-tauri/target/release/bundle/msi/Booki_*_x64_en-US.msi.sig
          if-no-files-found: error

      # Fallback: if tauri-action built bundles but could not create the GitHub
      # Release (common when GITHUB_TOKEN cannot publish tags cut off main),
      # publish the local installers with gh.
      # With continue-on-error, failed steps still report conclusion=success.
      # Use outcome (pre-continue-on-error) to detect a real publish failure.
      - name: Publish release from local bundles
        if: steps.tauri.outcome == 'failure'
        id: fallback
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}"
          VER="${TAG#v}"
          ROOT="src-tauri/target/release/bundle"
          mapfile -t FILES < <(find "${ROOT}/nsis" "${ROOT}/msi" -type f \( -name 'Booki_*.exe' -o -name 'Booki_*.msi' -o -name 'Booki_*.sig' \) 2>/dev/null | sort)
          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No bundle files found; build likely failed earlier."
            exit 1
          fi
          if ! gh release view "${TAG}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Booki ${TAG}" \
              --notes "Booki Dock for Windows.

          Download the **Booki_*_x64-setup.exe** installer for the normal per-user installation.

          WebView2 is downloaded automatically when it is missing.

          **SmartScreen note:** Booki does not yet use a commercial code-signing certificate, so Windows may display a warning. Choose **More info** → **Run anyway**."
          fi
          gh release upload "${TAG}" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          EXE="$(printf '%s\n' "${FILES[@]}" | grep 'x64-setup\.exe$' | head -n1 || true)"
          SIG="$(printf '%s\n' "${FILES[@]}" | grep 'x64-setup\.exe\.sig$' | head -n1 || true)"
          if [[ -n "${EXE}" ]]; then
            EXE_NAME="$(basename "${EXE}")"
            SIG_B64=""
            if [[ -n "${SIG}" && -f "${SIG}" ]]; then
              SIG_B64="$(tr -d '\r\n' < "${SIG}")"
            fi
            URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/${EXE_NAME}"
            jq -n \
              --arg version "${VER}" \
              --arg url "${URL}" \
              --arg signature "${SIG_B64}" \
              --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                version: $version,
                notes: "",
                pub_date: $pub_date,
                platforms: {
                  "windows-x86_64": { signature: $signature, url: $url }
                }
              }' > latest.json
            gh release upload "${TAG}" latest.json --repo "$GITHUB_REPOSITORY" --clobber
          fi
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "Published fallback release assets for ${TAG}"

      - name: Verify published installers
        if: always() && (steps.tauri.outcome == 'success' || steps.fallback.outcome == 'success')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}"
          assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "$assets"
          grep -Eq 'x64-setup\.exe$' <<< "$assets"
          grep -Eq '\.msi$' <<< "$assets"
          grep -Eq 'latest\.json$' <<< "$assets"

      # Only prune AFTER a successful publish. Never delete the previous release
      # when the new one failed to create (that left the repo with zero releases).
      - name: Prune old releases
        if: always() && (steps.tauri.outcome == 'success' || steps.fallback.outcome == 'success')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          keep="${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}"
          if ! gh release view "$keep" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Refusing to prune: release $keep does not exist"
            exit 1
          fi
          echo "Keeping latest release: $keep"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            if [ -n "$tag" ] && [ "$tag" != "$keep" ]; then
              echo "Deleting old release $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
          done
