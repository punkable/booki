name: Release (Windows)

# Publishes a GitHub Release with the Windows installers (.exe / .msi)
# attached, so anyone can download Booki Dock directly — no login or
# digging through CI artifacts required.
#
# Trigger by pushing a tag like `v0.1.0`, or run manually from the
# Actions tab (workflow_dispatch) providing a tag name.

on:
  push:
    tags:
      - "v*"
    # Temporary: also publish from the dev branch so the first downloadable
    # installer exists before the PR is merged (tag pushes are restricted in
    # the dev environment). Remove this branch trigger once on main + tags.
    branches:
      - "claude/docky-windows-modernize-10rbkk"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v0.1.0' }}
          releaseName: "Booki Dock ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v0.1.0' }}"
          releaseBody: |
            **Booki Dock** — a modern, lightweight dock for Windows. 🦫

            Download the installer below and run it:
            - `Booki_*_x64-setup.exe` — recommended (NSIS, per-user install)
            - `Booki_*_x64_en-US.msi` — MSI alternative

            Requires Windows 10/11. The WebView2 runtime is fetched automatically if missing.

            > Early / alpha build. See the README for features and roadmap.
          releaseDraft: false
          prerelease: true
