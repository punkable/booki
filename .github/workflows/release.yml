name: Release (Windows)

# Publishes a GitHub Release with the Windows installers (.exe / .msi)
# attached, so anyone can download Booki Dock directly — no login or
# digging through CI artifacts required.
#
# Trigger by pushing a tag like `v0.1.0`, or run manually from the
# Actions tab (workflow_dispatch) providing a tag name.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Check visible text encoding
        run: npm run check:text

      # Derive the release tag from package.json for manual runs. Normal
      # publishing is tag-based, so a version ships exactly once.
      - name: Resolve release tag
        id: ver
        shell: bash
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-updater signing. Add these as repo secrets to enable signed
          # update artifacts (latest.json + .sig). Until then, builds are
          # unsigned and the in-app updater simply finds no update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}
          releaseName: "Booki Dock ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }} (beta)"
          releaseBody: |
            **Booki Dock** — a modern, lightweight dock for Windows. 🦫 _Beta._

            Download **`Booki_*_x64-setup.exe`** below and run it (per-user install, no admin needed).

            This beta patch focuses on a cleaner everyday dock: a more structured Settings experience, clearer quick themes and accent colors, easier pinned-app management, calmer Mica-aligned surfaces, better responsive behavior for narrow windows, and more comfortable interaction targets across dock flyouts, menus and modals.

            Requires Windows 10/11. The WebView2 runtime is fetched automatically if missing.

            **SmartScreen / Defender note:** this beta isn't signed with a commercial certificate yet, so Windows may show "Windows protected your PC" — choose *More info → Run anyway*. Booki only touches its own folder, your dock settings and the per-user startup entry; deletions from the dock's trash go to the Recycle Bin (recoverable). If Defender's *Controlled folder access* blocks a delete, allow Booki in Windows Security → Ransomware protection.

            Created by **Punkable** ([GitHub](https://github.com/punkable) · [@0xPunki on X](https://x.com/0xPunki)).

            > Beta build — only the latest version is kept available. The in-app updater keeps you current.
          releaseDraft: false
          # Must be a full release (not prerelease) so the updater endpoint
          # `releases/latest/download/latest.json` resolves. "Beta" is a label only.
          prerelease: false

      # Keep only the just-published release downloadable: delete every older
      # release (and its tag) so users always grab the latest beta.
      - name: Prune old releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          keep="${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || steps.ver.outputs.tag }}"
          echo "Keeping latest release: $keep"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' | while read -r tag; do
            if [ -n "$tag" ] && [ "$tag" != "$keep" ]; then
              echo "Deleting old release $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
          done
