name: Build Booki Dock (WinUI 3)

on:
  push:
    branches: [main]
    paths:
      - "src-winui/**"
      - "Booki.slnx"
      - ".github/workflows/build-winui.yml"
  pull_request:
    paths:
      - "src-winui/**"
      - "Booki.slnx"
      - ".github/workflows/build-winui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src-winui/Booki.Dock/Booki.Dock.csproj -r win-x64

      - name: Build WinUI 3
        run: dotnet build src-winui/Booki.Dock/Booki.Dock.csproj -c Release -r win-x64 --no-restore

      - name: Upload preview build
        uses: actions/upload-artifact@v4
        with:
          name: Booki-Dock-WinUI3-win-x64
          path: src-winui/Booki.Dock/bin/Release/net10.0-windows10.0.26100.0/win-x64/
          if-no-files-found: error
