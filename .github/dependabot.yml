# Keep the three ecosystems patched: npm (frontend), cargo (backend) and the
# release workflow's actions. Weekly, batched, so update PRs stay manageable.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-all:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    # Booki only ships Windows builds. Tauri/Wry still records the Linux
    # GTK3/WebKitGTK stack in Cargo.lock, and that stack currently pins
    # gtk-rs/glib 0.18.x while RUSTSEC-2024-0429 is fixed in glib 0.20+.
    # Dependabot cannot raise this transitively without a Wry/Tauri GTK
    # migration, so keep normal Cargo updates on but suppress this one
    # non-shipped Linux binding until upstream can move past GTK3.
    ignore:
      - dependency-name: glib
    groups:
      cargo-all:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
