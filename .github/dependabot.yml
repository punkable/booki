# Keep the three ecosystems patched: npm (frontend), cargo (backend) and the
# release workflow's actions. Weekly, batched, so update PRs stay manageable.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-all:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      cargo-all:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
