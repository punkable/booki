<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booki</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body class="popup-shell">
    <main class="popup" aria-label="Booki quick actions">
      <header class="popup-header">
        <div class="brand">
          <picture>
            <source srcset="media/SVG/logowhite.svg" media="(prefers-color-scheme: dark)">
            <img class="brand-wordmark" src="media/SVG/logo.svg" alt="Booki">
          </picture>
        </div>
        <div style="display:flex;gap:4px;">
          <button class="icon-button" id="openPanel" type="button" title="Open full manager" aria-label="Open full manager">
            <span class="svg-icon" data-icon="external" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <div class="popup-section">
        <div class="current-page" aria-live="polite">
          <img id="pageIcon" class="popup-favicon" alt="">
          <div class="page-copy">
            <p id="pageTitle" class="page-title skeleton-line">Loading</p>
            <p id="pageUrl" class="page-url skeleton-line short">Preparing</p>
          </div>
          <button class="icon-button" id="starCurrent" type="button" title="Toggle star" aria-label="Toggle star" hidden>
            <span class="svg-icon" data-icon="star" aria-hidden="true"></span>
          </button>
        </div>

        <form id="quickSaveForm" class="quick-save">
          <input id="quickTags" name="tags" type="text" autocomplete="off" placeholder="Tags (design, dev, inspiration)">
          <select id="folderSelect" name="folder" class="folder-select"></select>
          <button class="primary-button" id="quickSaveButton" type="submit" style="flex-shrink:0;">
            <span class="svg-icon" data-icon="save" aria-hidden="true"></span>
            <span id="quickSaveLabel">Save</span>
          </button>
        </form>
        <p id="quickSaveStatus" class="popup-status" aria-live="polite"></p>
      </div>

      <div class="popup-section">
        <div class="popup-section-title">
          <span id="resultsTitle">Recent bookmarks</span>
          <span id="resultsCount"></span>
        </div>
        <label class="popup-search">
          <span class="svg-icon" data-icon="search" aria-hidden="true"></span>
          <input id="popupSearch" type="search" placeholder="Search bookmarks…">
        </label>
        <div id="popupResults" class="popup-results" aria-live="polite">
          <div class="popup-empty">No recent bookmarks</div>
        </div>
      </div>

      <div class="popup-actions">
        <button class="secondary-button" id="openLibrary" type="button">
          <span class="svg-icon" data-icon="bookmark" aria-hidden="true"></span>
          Library
        </button>
        <button class="secondary-button" id="openOptions" type="button">
          <span class="svg-icon" data-icon="settings" aria-hidden="true"></span>
          Settings
        </button>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
